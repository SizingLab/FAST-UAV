name: watchdog-tests

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches: [ 'main' ]
  schedule:
    - cron: '0 4 * * 1'   # Monday 06:00 (UTC+2)

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: [ '3.9', '3.10', '3.11', '3.12' ]
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - uses: actions/checkout@v4

      - name: Install poetry
        run: pipx install poetry==${{ vars.POETRY_VERSION }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'poetry'

      - name: Install latest version of dependencies
        run: |
          poetry env use ${{ matrix.python-version }}
          poetry update
          poetry install

      - name: Unit tests
        run: poetry run pytest src
        shell: bash

      - name: Notebook tests
        run: poetry run pytest --no-cov --nbval-lax -p no:python src/fastuav/notebooks
        shell: bash
